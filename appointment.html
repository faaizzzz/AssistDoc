<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    
    <!-- Embedded all CSS styles from external stylesheet -->
    <style>
        /* CSS Variables for Theming */
        :root {
            /* Align color palette with main_index.html */
            --bg-primary: #F5F5F5; /* page background */
            --bg-secondary: rgba(255, 255, 255, 0.98);
            --card-bg: #ffffff;
            --text-primary: #1A1A1A; /* var(--text-dark) */
            --text-secondary: #2C3E50; /* var(--cta) */
            --text-muted: #7f8c8d;
            --primary-color: #D4AF37; /* var(--secondary) gold */
            --secondary-color: #0B1C2C; /* var(--primary) deep blue */
            --success-color: #27ae60;
            --border-color: #e0e0e0;
            --shadow: rgba(0,0,0,0.1);
            --shadow-hover: rgba(0,0,0,0.15);
            --close-btn-bg: #f0f0f0;
            --secondary-btn-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-primary: #0B1C2C;
            --bg-secondary: rgba(26, 26, 46, 0.95);
            --card-bg: #1e1e3f;
            --text-primary: #e0e0e0;
            --text-secondary: #D4AF37;
            --text-muted: #b0b0b0;
            --primary-color: #D4AF37;
            --secondary-color: #0B1C2C;
            --success-color: #2ecc71;
            --border-color: #333355;
            --shadow: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.4);
            --close-btn-bg: #2a2a4a;
            --secondary-btn-bg: #252545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px 15px;
            transition: background 0.3s ease, color 0.3s ease;
            font-size: 14px;
        }

        /* Theme Toggle Button */
        #theme-toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px var(--shadow-hover);
        }

        .theme-icon {
            transition: transform 0.3s ease;
        }

        .theme-toggle-btn:hover .theme-icon {
            transform: rotate(15deg);
        }

        #container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 40px;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: 0 25px 50px var(--shadow);
            backdrop-filter: blur(10px);
            transition: background 0.3s ease;
        }

        #header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2.2em;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1em;
            margin: 0;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        #illness-input-section {
            margin-bottom: 30px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .input-wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        .input-wrapper label {
            display: block;
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
            transition: color 0.3s ease;
        }

        .input-hint {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9em;
            margin: 0 0 20px 0;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .input-group {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        #illness-input {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 10px var(--shadow);
        }

        #illness-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 4px 20px rgba(52, 152, 219, 0.2);
            transform: translateY(-2px);
        }

        #illness-input::placeholder {
            color: var(--text-muted);
        }

        #update-illness-btn {
            background: linear-gradient(135deg, var(--primary-color), #b8941f);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            white-space: nowrap;
        }

        #update-illness-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(52, 152, 219, 0.4);
        }

        #update-illness-btn:active {
            transform: translateY(-1px);
        }

        #illness-info {
            text-align: center;
            margin: 20px 0 30px 0;
            font-size: 1em;
            background: linear-gradient(135deg, var(--primary-color), #FFD700);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #map {
            height: 450px;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: none;
            overflow: hidden;
        }

        #places-list {
            margin-top: 20px;
        }

        #places-list h2 {
            color: var(--text-primary);
            font-size: 1.6em;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            font-weight: 700;
            padding-bottom: 15px;
            transition: color 0.3s ease;
        }

        #places-list h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 1.1em;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        #places {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        #places li {
            background: var(--card-bg);
            border: none;
            margin-bottom: 0;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease-out;
        }

        #places li::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, var(--primary-color), #FFD700);
        }

        #places li:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
            border-color: #e0e0e0;
        }

        .facility-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        #places h3 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.2em;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
            min-width: 200px;
            transition: color 0.3s ease;
        }

        .distance-badge {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(52, 152, 219, 0.3);
        }

        .facility-details {
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            align-items: flex-start;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-icon {
            font-size: 1.2em;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .detail-content {
            flex: 1;
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        .detail-content strong {
            color: var(--text-primary);
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }

        /* Rating Styles */
        .rating-display {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .star {
            color: #ddd;
            font-size: 1.2em;
            transition: color 0.2s ease;
        }

        .star.filled {
            color: #ffc107;
        }

        .star.half {
            color: #ffc107;
            opacity: 0.7;
        }

        .rating-value {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1em;
        }

        .rating-reviews {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .fee-amount {
            color: var(--primary-color);
            font-size: 1.3em;
            font-weight: 700;
        }

        /* View Details Button */
        .view-details-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .view-details-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(52, 152, 219, 0.4);
        }

        .view-details-btn:active {
            transform: translateY(-1px);
        }

        .detail-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .detail-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        .not-available {
            color: var(--text-muted);
        }

        /* Hospital Detail Modal Styles */
        .hospital-detail-modal {
            backdrop-filter: blur(5px);
        }

        .hospital-detail-card {
            border: 1px solid var(--border-color);
        }

        .close-modal-btn:hover {
            background: var(--close-btn-bg);
            transform: rotate(90deg);
            opacity: 0.8;
        }

        .book-appointment-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
        }

        .close-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .detail-section {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        /* Filters Section */
        #filters-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px var(--shadow);
            border: 1px solid var(--border-color);
        }

        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95em;
        }

        .filter-value {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1em;
        }

        .filter-slider {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: var(--bg-secondary);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .filter-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.4);
            transition: all 0.3s ease;
        }

        .filter-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.6);
        }

        .filter-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.4);
            transition: all 0.3s ease;
        }

        .filter-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.6);
        }

        .apply-filters-btn, .reset-filters-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .apply-filters-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .apply-filters-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .reset-filters-btn {
            background: var(--secondary-btn-bg);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .reset-filters-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        /* Photo Gallery Styles */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .photo-item {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4 / 3;
            background: #f7f8fb;
            min-height: 180px;
            border: 1px solid var(--border-color);
        }

        .photo-gallery img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-gallery img:hover {
            transform: scale(1.05);
        }

        #places p {
            margin: 12px 0;
            color: var(--text-secondary);
            font-size: 1em;
            line-height: 1.6;
            transition: color 0.3s ease;
        }

        #places a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        #places a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        #places button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        #places button:hover {
            background: linear-gradient(135deg, #229954, #27ae60);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
        }

        #places button:active {
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
                font-size: 13px;
            }

            #container {
                padding: 20px 20px;
                border-radius: 15px;
            }

            #header {
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            #illness-input-section {
                padding: 20px;
                margin-bottom: 20px;
            }

            .input-wrapper label {
                font-size: 1em;
            }

            .input-hint {
                font-size: 0.85em;
                margin-bottom: 15px;
            }

            #illness-input {
                min-width: 100%;
                padding: 10px 16px;
                font-size: 0.95em;
            }

            #update-illness-btn {
                width: 100%;
                padding: 10px 20px;
                font-size: 0.95em;
            }

            #map {
                height: 350px;
                margin-bottom: 20px;
            }

            #places-list h2 {
                font-size: 1.4em;
                margin-bottom: 20px;
            }

            #places {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            #places li {
                padding: 20px;
            }

            .facility-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .distance-badge {
                align-self: flex-start;
                margin-top: 10px;
            }

            .detail-item {
                gap: 12px;
                margin-bottom: 18px;
                padding-bottom: 18px;
            }

            .detail-icon {
                font-size: 1.3em;
                width: 30px;
            }

            .detail-content {
                font-size: 0.95em;
            }

            #filters-section {
                padding: 20px;
            }

            .filters-container {
                flex-direction: column;
                gap: 15px;
            }

            .filter-group {
                min-width: 100%;
            }

            .apply-filters-btn, .reset-filters-btn {
                width: 100%;
            }

            #illness-info {
                font-size: 1.1em;
                padding: 15px 25px;
                margin: 30px 0 40px 0;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #3498db, #2980b9);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(45deg, #2980b9, #3498db);
        }
    </style>
</head>
<body>
    <div id="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Dark/Light Mode">
            <span class="theme-icon">🌙</span>
        </button>
    </div>
    
    <div id="container">
        <header id="header">
            <h1>🏥 Healthcare Appointment Booking</h1>
            <p class="subtitle">Find the right medical facility for your needs</p>
        </header>
        
        <div id="illness-input-section">
            <div class="input-wrapper">
                <label for="illness-input">What are you looking for?</label>
                <p class="input-hint">Enter your illness, symptom, or medical specialty</p>
                <div class="input-group">
                    <input type="text" id="illness-input" placeholder="e.g., flu, headache, cardiac, dental, eye exam" />
                    <button id="update-illness-btn">🔍 Find Facilities</button>
                </div>
            </div>
        </div>
        
        <div id="illness-info" style="display: none;">
            <span id="illness-name"></span>
        </div>
        
        <div id="map"></div>
        
        <div id="places-list">
            <h2>🏨 Nearby Healthcare Facilities</h2>
            
            <div id="filters-section" style="display: none;">
                <div class="filters-container">
                    <div class="filter-group">
                        <label for="rating-filter" class="filter-label">
                            <span>⭐ Minimum Rating:</span>
                            <span id="rating-value" class="filter-value">3.0</span>

            const specialtyLower = (specialty || '').toLowerCase();
            const illnessLower = (illness || '').toLowerCase();
            
            let feeRange = baseFees.default;

        function rankPlacesByIllness(places, illness, relevantSpecialties) {
            // Rank places based on how relevant they are to the illness
            const illnessLower = illness.toLowerCase();
            
            return places.map(place => {
                let relevanceScore = 0;
                const name = (place.tags?.name || '').toLowerCase();
                const specialty = (place.tags?.specialty || '').toLowerCase();
                const healthcare = (place.tags?.healthcare || '').toLowerCase();
                const description = (place.tags?.description || '').toLowerCase();
                
                // Check if name contains illness-related terms
                if (name.includes(illnessLower)) {
                    relevanceScore += 10;
                }
                
                // Check for specialty matches
                relevantSpecialties.forEach(spec => {
                    if (name.includes(spec) || specialty.includes(spec) || healthcare.includes(spec) || description.includes(spec)) {
                        relevanceScore += 8;
                    }
                });
                
                // General hospital/clinic gets base score
                if (place.tags?.amenity === 'hospital') {
                    relevanceScore += 5;
                } else if (place.tags?.amenity === 'clinic') {
                    relevanceScore += 3;
                }
                
                return { ...place, relevanceScore };
            })
            .filter(place => place.relevanceScore > 0) // Only include places with some relevance
            .sort((a, b) => b.relevanceScore - a.relevanceScore) // Sort by relevance
            .slice(0, 20); // Limit to top 20 results
        }

        // Calculate distance between two coordinates using Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the Earth in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c; // Distance in km
            return distance;
        }

        // Format distance for display
        function formatDistance(distance) {
            if (distance < 1) {
                return `${Math.round(distance * 1000)}m away`;
            } else if (distance < 10) {
                return `${distance.toFixed(1)}km away`;
            } else {
                return `${Math.round(distance)}km away`;
            }
        }

            }
            
            return 'General healthcare services';
        }

        // Initialize filter controls
        function initializeFilters() {
            const ratingFilter = document.getElementById('rating-filter');
            const feeFilter = document.getElementById('fee-filter');
            const ratingValue = document.getElementById('rating-value');
            const feeValue = document.getElementById('fee-value');
            const applyBtn = document.getElementById('apply-filters-btn');
            const resetBtn = document.getElementById('reset-filters-btn');
            
            if (!ratingFilter || !feeFilter) return; // Exit if filters don't exist
            
            // Remove existing listeners by cloning and replacing
            const newRatingFilter = ratingFilter.cloneNode(true);
            const newFeeFilter = feeFilter.cloneNode(true);
            const newApplyBtn = applyBtn.cloneNode(true);
            const newResetBtn = resetBtn.cloneNode(true);
            
            ratingFilter.parentNode.replaceChild(newRatingFilter, ratingFilter);
            feeFilter.parentNode.replaceChild(newFeeFilter, feeFilter);
            applyBtn.parentNode.replaceChild(newApplyBtn, applyBtn);
            resetBtn.parentNode.replaceChild(newResetBtn, resetBtn);
            
            // Update display values
            newRatingFilter.addEventListener('input', function() {
                ratingValue.textContent = parseFloat(this.value).toFixed(1);
            });
            
            newFeeFilter.addEventListener('input', function() {
                feeValue.textContent = `₹${parseInt(this.value).toLocaleString()}`;
            });
            
            // Apply filters
            newApplyBtn.addEventListener('click', function() {
                applyFilters();
            });
            
            // Reset filters
            newResetBtn.addEventListener('click', function() {
                newRatingFilter.value = 0;
                newFeeFilter.value = 10000;
                ratingValue.textContent = '0.0';
                feeValue.textContent = '₹10,000';
                applyFilters();
            });
        }

        // Apply filters to displayed places
        function applyFilters() {
            const ratingFilter = document.getElementById('rating-filter');
            const feeFilter = document.getElementById('fee-filter');
            
            if (!ratingFilter || !feeFilter) return;
            
            const minRating = parseFloat(ratingFilter.value);
            const maxFee = parseInt(feeFilter.value);
            
            const filtered = allPlacesData.filter(place => {
                return place.rating >= minRating && place.consultationFee <= maxFee;
            });
            
            // Re-render filtered places
            if (filtered.length === 0) {
                document.getElementById('places').innerHTML = `<li style="text-align: center; padding: 60px 40px; grid-column: 1 / -1;"><h3 style="font-size: 1.8em; margin-bottom: 20px; color: #2c3e50;">🔍 No facilities match your filters</h3><p style="font-size: 1.1em; color: #7f8c8d; line-height: 1.6;">Try adjusting your rating or fee filters.</p></li>`;
                // Clear markers
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];
            } else {
                // Clear current display
                document.getElementById('places').innerHTML = '';
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];
                
                // Re-render filtered places
                filtered.forEach(function(placeData) {
                    renderPlaceCard(placeData);
                });
            }
        }

                            letter-spacing: 0.5px;

                        <button class="close-btn" style="
                            flex: 1;
                            min-width: 120px;
                            background: var(--secondary-btn-bg);
                            color: var(--text-primary);
                            border: 2px solid var(--border-color);
                            padding: 14px 30px;
                            border-radius: 12px;
                            cursor: pointer;
                            font-weight: 600;
                            font-size: 1em;
                            transition: all 0.3s ease;
                        ">Close</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);

            // Add event listeners
            const closeBtn = modal.querySelector('.close-modal-btn');
            const closeButton = modal.querySelector('.close-btn');
            const bookBtn = modal.querySelector('.book-appointment-btn');
            
            closeBtn.addEventListener('click', closeHospitalModal);
            closeButton.addEventListener('click', closeHospitalModal);
            bookBtn.addEventListener('click', function() {
                bookAppointmentFromModal(name, placeId, consultationFee, doctorInfo);
            });
            
            // Add photo click listeners
            const photoItems = modal.querySelectorAll('.photo-item');
            photoItems.forEach(photoItem => {
                photoItem.addEventListener('click', function() {
                    const photoUrl = this.dataset.photoUrl;
                    const photoIndex = parseInt(this.dataset.photoIndex);
                    window.openPhotoModal(photoUrl, photoIndex);
                });
            });
            
            // Close on background click
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeHospitalModal();
                }
            });
            
            // Store modal reference and place data
            window.currentModal = modal;
            window.currentPlaceData = placeData;
        }

        // Photo modal for viewing full-size images (make it globally accessible)
        window.openPhotoModal = function(photoUrl, index) {
            const photoModal = document.createElement('div');
            photoModal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.95); display: flex; justify-content: center;
                align-items: center; z-index: 3000; animation: fadeIn 0.3s ease;
            `;
            
            photoModal.innerHTML = `
                <div style="position: relative; max-width: 90%; max-height: 90%;">
                    <button class="close-photo-btn" style="
                        position: absolute; top: -40px; right: 0;
                        background: rgba(255,255,255,0.2); border: none;
                        width: 35px; height: 35px; border-radius: 50%;
                        cursor: pointer; font-size: 1.5em; color: white;
                        display: flex; align-items: center; justify-content: center;
                        transition: all 0.3s ease;
                    ">×</button>
                    <img src="${photoUrl}" alt="Hospital photo" style="max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);" onerror="this.src='https://via.placeholder.com/800x600/4A90E2/FFFFFF?text=Hospital+Photo'">
                </div>
            `;
            
            document.body.appendChild(photoModal);
            
            const closeBtn = photoModal.querySelector('.close-photo-btn');
            closeBtn.addEventListener('click', function() {
                photoModal.remove();
            });
            
            photoModal.addEventListener('click', function(e) {
                if (e.target === photoModal) {
                    photoModal.remove();
                }
            });
        }

        function closeHospitalModal() {
            if (window.currentModal) {
                window.currentModal.remove();
                window.currentModal = null;
            }
        }

        function bookAppointmentFromModal(placeName, placeId, consultationFee, doctorInfo) {
            // Close the hospital details modal first
            closeHospitalModal();
            
            // Create a booking confirmation modal
            const bookingModal = document.createElement('div');
            bookingModal.className = 'booking-confirmation-modal';
            bookingModal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.8); display: flex; justify-content: center;
                align-items: center; z-index: 2000; animation: fadeIn 0.3s ease;
                padding: 20px;
            `;
            
            const currentDate = new Date();
            const appointmentDate = new Date(currentDate.getTime() + 24 * 60 * 60 * 1000); // Next day
            const appointmentTime = '10:00 AM'; // Default time
            
            bookingModal.innerHTML = `
                <div class="booking-confirmation-card" style="
                    background: var(--card-bg);
                    padding: 25px 20px;
                    border-radius: 15px;
                    max-width: 450px;
                    width: 100%;
                    text-align: center;
                    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
                    animation: slideIn 0.3s ease;
                    border: 1px solid var(--border-color);
                    margin: auto;
                ">
                    <div style="font-size: 3em; margin-bottom: 15px;">📅</div>
                    <h2 style="color: var(--text-primary); margin-bottom: 20px; font-size: 1.5em; font-weight: 700;">Confirm Appointment</h2>
                    
                    <div style="text-align: left; background: var(--bg-secondary); padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
                        <div style="margin-bottom: 12px;">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">🏥 Hospital:</strong>
                            <p style="color: var(--text-secondary); margin: 4px 0 0 0; font-size: 0.9em;">${placeName}</p>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">👨‍⚕️ Treatment:</strong>
                            <p style="color: var(--text-secondary); margin: 4px 0 0 0; font-size: 0.9em;">${doctorInfo}</p>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">💰 Consultation Fee:</strong>
                            <p style="color: var(--primary-color); margin: 4px 0 0 0; font-size: 1.1em; font-weight: 700;">₹${consultationFee.toLocaleString()}</p>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">📅 Date:</strong>
                            <p style="color: var(--text-secondary); margin: 4px 0 0 0; font-size: 0.9em;">${appointmentDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                        <div>
                            <strong style="color: var(--text-primary); font-size: 0.95em;">🕐 Time:</strong>
                            <p style="color: var(--text-secondary); margin: 4px 0 0 0; font-size: 0.9em;">${appointmentTime}</p>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        <button class="confirm-booking-btn" style="
                            background: linear-gradient(135deg, #27ae60, #2ecc71);
                            color: white; border: none; padding: 12px 25px;
                            border-radius: 10px; cursor: pointer; font-weight: 600;
                            font-size: 0.95em; transition: all 0.3s ease;
                            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
                            flex: 1;
                            min-width: 130px;
                        ">✅ Confirm Booking</button>
                        <button class="cancel-booking-btn" style="
                            background: var(--secondary-btn-bg);
                            color: var(--text-primary); border: 2px solid var(--border-color);
                            padding: 12px 25px; border-radius: 10px; cursor: pointer;
                            font-weight: 600; font-size: 0.95em; transition: all 0.3s ease;
                            flex: 1;
                            min-width: 130px;
                        ">❌ Cancel</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(bookingModal);
            
            // Add event listeners
            const confirmBtn = bookingModal.querySelector('.confirm-booking-btn');
            const cancelBtn = bookingModal.querySelector('.cancel-booking-btn');
            
            confirmBtn.addEventListener('click', function() {
                confirmBtn.innerHTML = '⏳ Booking...';
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.7';

                setTimeout(() => {
                    bookingModal.remove();
                    showBookingSuccess(placeName, appointmentDate, appointmentTime, consultationFee, doctorInfo);
                }, 2000);
            });
            
            cancelBtn.addEventListener('click', function() {
                bookingModal.remove();
            });
            
            // Close on background click
            bookingModal.addEventListener('click', function(e) {
                if (e.target === bookingModal) {
                    bookingModal.remove();
                }
            });
        }

        function showBookingSuccess(placeName, appointmentDate, appointmentTime, consultationFee, doctorInfo) {
            const successModal = document.createElement('div');
            successModal.className = 'booking-success-modal';
            successModal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.8); display: flex; justify-content: center;
                align-items: center; z-index: 2000; animation: fadeIn 0.3s ease;
                padding: 20px; overflow-y: auto;
            `;
            
            successModal.innerHTML = `
                <div class="booking-success-card" style="
                    background: var(--card-bg);
                    padding: 30px 25px;
                    border-radius: 15px;
                    max-width: 500px;
                    width: 100%;
                    text-align: center;
                    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
                    animation: slideIn 0.3s ease;
                    border: 1px solid var(--border-color);
                    margin: auto;
                ">
                    <div style="font-size: 3em; margin-bottom: 15px; animation: bounce 0.6s ease;">✅</div>
                    <h2 style="color: var(--text-primary); margin-bottom: 8px; font-size: 1.6em; font-weight: 700;">Appointment Booked!</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95em;">Your appointment has been successfully confirmed.</p>
                    
                    <div style="text-align: left; background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">🏥 Hospital Name</strong>
                            <p style="color: var(--text-secondary); margin: 5px 0 0 0; font-size: 0.9em;">${placeName}</p>
                        </div>
                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">👨‍⚕️ Treatment</strong>
                            <p style="color: var(--text-secondary); margin: 5px 0 0 0; font-size: 0.9em;">${doctorInfo}</p>
                        </div>
                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">💰 Consultation Fee</strong>
                            <p style="color: var(--primary-color); margin: 5px 0 0 0; font-size: 1.1em; font-weight: 700;">₹${consultationFee.toLocaleString()}</p>
                        </div>
                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                            <strong style="color: var(--text-primary); font-size: 0.95em;">📅 Appointment Date</strong>
                            <p style="color: var(--text-secondary); margin: 5px 0 0 0; font-size: 0.9em;">${appointmentDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                        <div>
                            <strong style="color: var(--text-primary); font-size: 0.95em;">🕐 Appointment Time</strong>
                            <p style="color: var(--text-secondary); margin: 5px 0 0 0; font-size: 0.9em;">${appointmentTime}</p>
                        </div>
                    </div>
                    
                    <div style="background: #e8f5e9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #c8e6c9;">
                        <p style="color: #2e7d32; margin: 0; font-weight: 600; font-size: 0.85em; line-height: 1.5;">
                            📧 A confirmation email has been sent to your registered email address.<br>
                            📱 You will also receive an SMS reminder 1 hour before your appointment.
                        </p>
                    </div>
                    
                    <button class="close-success-btn" style="
                        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
                        color: white; border: none; padding: 12px 30px;
                        border-radius: 10px; cursor: pointer; font-weight: 600;
                        font-size: 0.95em; transition: all 0.3s ease;
                        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
                        width: 100%;
                    ">Close</button>
                </div>
            `;
            
            document.body.appendChild(successModal);
            
            const closeBtn = successModal.querySelector('.close-success-btn');
            closeBtn.addEventListener('click', function() {
                successModal.remove();
            });
            
            // Close on background click
            successModal.addEventListener('click', function(e) {
                if (e.target === successModal) {
                    successModal.remove();
                }
            });
        }

        // Keep the old function for backward compatibility
        function bookAppointment(placeName, placeId) {
            // This function is kept for backward compatibility
            // It will try to find the place data from stored data
            const placeElement = document.querySelector(`li[data-place-data*="${placeId}"]`);
            if (placeElement) {
                const placeData = JSON.parse(placeElement.dataset.placeData);
                showHospitalDetails(placeData);
            }
        }
    </script>
</body>
</html>
